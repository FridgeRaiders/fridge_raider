<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head lang="en">
    <meta charset="UTF-8"/>
    <title>Fridge Raider</title>
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link th:href="@{/main.css}" rel="stylesheet"/>
</head>

<body class="bg-gray-900 min-h-screen flex flex-col">

<div th:replace="fragments/navbar :: navbar"></div>

<!-- Hero -->
<header class="relative bg-green-950/50 border-b border-amber-400/20 min-h-96">

    <!-- Scrolling food photo background -->
    <div class="absolute inset-0 flex flex-col gap-3 justify-center opacity-60 pointer-events-none select-none overflow-hidden" aria-hidden="true">

        <!-- Row 1 — scrolls left -->
        <div class="flex gap-3 animate-[scroll-left_35s_linear_infinite] whitespace-nowrap">
            <div th:each="i : ${#numbers.sequence(1,2)}" class="flex gap-3">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1476224203421-9ac39bcb3327?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
            </div>
        </div>

        <!-- Row 2 — scrolls right -->
        <div class="flex gap-3 animate-[scroll-right_28s_linear_infinite] whitespace-nowrap">
            <div th:each="i : ${#numbers.sequence(1,2)}" class="flex gap-3">
                <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1547592180-85f173990554?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1504754524776-8f4f37790ca0?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1455619452474-d2be8b1e70cd?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1484723091739-30a097e8f929?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
            </div>
        </div>

        <!-- Row 3 — scrolls left, slower -->
        <div class="flex gap-3 animate-[scroll-left_45s_linear_infinite] whitespace-nowrap">
            <div th:each="i : ${#numbers.sequence(1,2)}" class="flex gap-3">
                <img src="https://images.unsplash.com/photo-1432139555190-58524dae6a55?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1506354666786-959d6d497f1a?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1559847844-5315695dadae?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1561043433-aaf687c4cf04?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
                <img src="https://images.unsplash.com/photo-1516100882582-96c3a05fe590?w=200&h=130&fit=crop" class="h-32 w-48 object-cover rounded-lg shrink-0" alt=""/>
            </div>
        </div>

    </div>

    <!-- Dark overlay -->
    <div class="absolute inset-0 bg-green-950/60 pointer-events-none" aria-hidden="true"></div>

    <!-- Hero content -->
    <div class="relative mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8 flex flex-col items-center text-center">

        <h1 class="text-4xl font-bold tracking-tight text-white sm:text-5xl">Raid your fridge.</h1>
        <p class="mt-3 text-amber-100/70 text-base max-w-md">Add the ingredients you have and we'll find recipes you can make right now.</p>

        <!-- Search bar -->
        <div class="w-full max-w-xl mt-8" id="ingredient-search">

            <!-- Input row -->
            <div class="relative">
                <div class="flex items-center rounded-md bg-white/10 backdrop-blur-sm pl-3 outline-1 -outline-offset-1 outline-amber-400/30 has-[input:focus-within]:outline-2 has-[input:focus-within]:-outline-offset-2 has-[input:focus-within]:outline-amber-400 transition-all">
                    <div class="shrink-0 text-amber-400/60">
                        <svg class="size-4" viewBox="0 0 16 16" fill="none">
                            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/>
                            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <input
                            id="ingredient-input"
                            type="text"
                            placeholder="Search ingredients..."
                            autocomplete="off"
                            class="block min-w-0 grow bg-transparent py-2.5 pr-3 pl-2 text-sm text-white placeholder:text-amber-100/40 focus:outline-none"
                    />
                    <button
                            onclick="addFromInput()"
                            class="m-1 shrink-0 rounded px-3 py-1.5 text-sm font-medium text-green-900 bg-amber-400 hover:bg-amber-300 active:scale-95 transition-all cursor-pointer"
                    >
                        Add
                    </button>
                </div>

                <!-- Dropdown anchored below the input -->
                <ul id="search-dropdown"
                    role="listbox"
                    class="absolute z-10 w-full mt-1 bg-green-950 border border-amber-400/20 rounded-md shadow-lg hidden">
                </ul>
            </div>

            <!-- Selected ingredient tags -->
            <div id="selected-tags" class="flex flex-wrap gap-2 mt-3 min-h-10"></div>

        </div>
    </div>
</header>

<main class="flex-1 mx-auto w-full max-w-7xl px-4 py-10 sm:px-6 lg:px-8 pb-16">

    <!-- Default state — shown before any ingredients are selected -->
    <div id="recipe-placeholder" class="flex flex-col items-center justify-center py-20 text-center">
        <div class="text-5xl mb-4"><i class="fa-solid fa-bowl-food text-amber-400/40"></i></div>
        <p class="text-amber-400 font-semibold text-lg">Start adding ingredients</p>
        <p class="text-amber-100/40 text-sm mt-2 max-w-sm">Search for ingredients above and we'll find recipes you can make right now.</p>
    </div>

    <!-- Results section — populated by JavaScript -->
    <section id="recipe-results-section" class="hidden">
        <h2 class="text-lg font-semibold text-amber-400 mb-6">Recipes you can make</h2>
        <div id="recipe-results" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
        </div>
    </section>

    <!-- Recipe card template — invisible to the user, cloned by JavaScript -->
    <template id="recipe-card-template">
        <div class="recipe-card group flex flex-col rounded-2xl bg-green-950 border border-amber-400/10 overflow-hidden hover:border-amber-400/40 hover:shadow-lg hover:shadow-black/30 transition-all duration-300 cursor-pointer">

            <!-- Image -->
            <div class="recipe-image-wrapper relative h-48 bg-green-900/60 overflow-hidden">
                <img class="recipe-image w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500" src="" alt="" />

                <!-- Fallback shown when no image -->
                <div class="recipe-image-fallback absolute inset-0 flex items-center justify-center text-4xl text-amber-400/20">
                    <i class="fa-solid fa-bowl-food"></i>
                </div>

                <!-- Match score badge — top left -->
                <span class="recipe-match-score absolute top-3 left-3 text-xs font-bold px-2 py-0.5 rounded-full">
                </span>

                <!-- Budget badge — top right -->
                <span class="recipe-budget hidden absolute top-3 right-3 bg-amber-400 text-green-900 text-xs font-bold px-2 py-0.5 rounded-full">
                Budget
                </span>
            </div>

            <!-- Content -->
            <div class="flex flex-col flex-1 p-5 gap-3">

                <!-- Title -->
                <h3 class="recipe-description text-white font-semibold text-base leading-snug"></h3>

                <!-- Meta row -->
                <div class="flex flex-wrap gap-3 text-xs text-amber-400/70">
                <span class="recipe-prep flex items-center gap-1">
                    <i class="fa-solid fa-clock"></i>
                    <span class="recipe-prep-text"></span>
                </span>
                    <span class="recipe-cook flex items-center gap-1">
                    <i class="fa-solid fa-fire-burner"></i>
                    <span class="recipe-cook-text"></span>
                </span>
                    <span class="recipe-servings flex items-center gap-1">
                    <i class="fa-solid fa-people-group"></i>
                    <span class="recipe-servings-text"></span>
                </span>
                </div>

                <!-- Divider -->
                <div class="border-t border-amber-400/10"></div>

                <!-- Ingredients preview -->
                <p class="recipe-ingredients text-amber-100/40 text-xs leading-relaxed line-clamp-3"></p>

            </div>
        </div>
    </template>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<!-- Tailwind safelist for dynamically applied classes -->
<div class="hidden bg-green-400 bg-amber-400 bg-white/20 text-white text-green-900"></div>
<script th:inline="javascript">
    const isAuthenticated = [[${#authorization.expression('isAuthenticated()')}]];
</script>
<script th:src="@{/search.js}"></script>
</body>
</html>
