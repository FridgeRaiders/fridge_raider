<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head lang="en">
    <meta charset="UTF-8"/>
    <title>Fridge Raider</title>
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link th:href="@{/main.css}" rel="stylesheet"/>
</head>

<body class="bg-amber-50 min-h-screen flex flex-col">

<div th:replace="fragments/navbar :: navbar"></div>

<main class="flex-1 flex flex-col items-center justify-start container mx-auto px-4 pt-16 py-8">
<div class="">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-green-900">What's in your fridge?</h1>
        <p class="text-green-800 mt-2 text-sm">Add your ingredients and we'll find recipes you can make.</p>
    </div>

    <div class="w-full max-w-xl" id="ingredient-search">

        <!-- Search bar -->
        <div class="flex items-center rounded-md bg-white pl-3 border border-green-300 has-[input:focus-within]:border-green-600 has-[input:focus-within]:ring-2 has-[input:focus-within]:ring-green-200 shadow-sm transition-all">
            <div class="shrink-0 text-green-600">
                <svg class="size-4" viewBox="0 0 16 16" fill="none">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
            </div>
            <input
                    id="ingredient-input"
                    type="text"
                    placeholder="Search ingredients..."
                    class="block min-w-0 grow bg-transparent py-2.5 pr-3 pl-2 text-sm text-green-900 placeholder:text-green-400 focus:outline-none"
            />
            <button
                    onclick="addFromInput()"
                    class="m-1 shrink-0 rounded px-3 py-1.5 text-sm font-medium text-white bg-green-700 hover:bg-green-600 active:scale-95 transition-all cursor-pointer"
            >
                Add
            </button>
        </div>

        <!-- Suggestions dropdown -->
        <div id="suggestions" class="hidden relative">
            <ul class="absolute z-10 mt-1 w-full rounded-md bg-white border border-green-200 shadow-lg overflow-hidden">
            </ul>
        </div>

        <!-- Tags -->
        <div id="tags-container" class="mt-3 flex flex-wrap gap-2"></div>

    </div>
</div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
