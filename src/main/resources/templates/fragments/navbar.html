<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link th:href="@{/main.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<nav th:fragment="navbar" class="bg-green-900 shadow-md px-6 py-2" xmlns:sec="http://www.w3.org/1999/xhtml">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16">

        <!-- Logo -->
        <a href="/" class="flex items-center gap-3 shrink-0">
            <img th:src="@{/images/fridge_raider_logo_only.png}" alt="Fridge Raider" class="h-12 w-12 rounded-full object-cover">
            <span class="font-bold text-xl tracking-wide uppercase text-amber-400">Fridge Raider</span>
        </a>

        <!-- Desktop Nav Links -->
        <div class="flex items-center gap-6">
            <a href="#" class="text-amber-400 hover:text-white transition-colors text-sm font-medium">
                <i class="fa-solid fa-house mr-1"></i> Home
            </a>
            <a href="#" class="text-amber-400 hover:text-white transition-colors text-sm font-medium">
                <i class="fa-solid fa-bookmark mr-1"></i> Saved Recipes
            </a>
            <a href="#" class="text-amber-400 hover:text-white transition-colors text-sm font-medium">
                <i class="fa-solid fa-rss mr-1"></i> Feed
            </a>
            <a sec:authorize="isAuthenticated()" href="#" class="text-amber-400 hover:text-white transition-colors text-sm font-medium">
                <i class="fa-solid fa-gear mr-1"></i> Profile
            </a>
        </div>

        <!-- Desktop Auth Buttons -->
        <div class="hidden md:flex items-center gap-4">
            <a sec:authorize="isAuthenticated()" href="/logout" class="text-amber-400 hover:text-red-400 transition-colors text-sm font-medium navbar-actions">
                <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Logout
            </a>
            <a sec:authorize="!isAuthenticated()" href="/oauth2/authorization/okta" class="bg-amber-400 hover:brightness-110 text-green-900 text-sm font-bold px-4 py-2 rounded-lg transition-all">
                Login
            </a>
        </div>
    </div>
</nav>
</body>
</html>
