<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8"/>
    <title>Fridge Raider - Saved Recipes</title>
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <link th:href="@{/main.css}" rel="stylesheet"/>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col">

<div th:replace="fragments/navbar :: navbar"></div>

<main class="flex-1 flex justify-center px-4 py-8">
    <div class="w-full max-w-5xl flex flex-col gap-6">

        <!-- Page header -->
        <div class="flex flex-col gap-1 pb-2 border-b border-amber-400/10">
            <h1 class="text-white font-bold text-xl">Saved Recipes</h1>
            <p class="text-amber-100/40 text-sm">
                Recipes you have saved for later!
            </p>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(savedRecipes)}"
             class="flex flex-col items-center justify-center py-16 text-center">
            <div class="text-5xl mb-4">
                <i class="fa-regular fa-bookmark text-amber-400/30"></i>
            </div>
            <p class="text-amber-400 font-semibold text-lg">No saved recipes yet</p>
            <p class="text-amber-100/40 text-sm mt-2 max-w-sm">
                Save recipes from the home page or feed and they will appear here.
            </p>
        </div>

        <!-- Saved recipe cards -->
        <div th:if="${!#lists.isEmpty(savedRecipes)}"
             class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">

            <div th:each="saved : ${savedRecipes}"
                 class="saved-recipe-card group flex flex-col rounded-2xl bg-green-950 border border-amber-400/10 overflow-hidden hover:border-amber-400/40 hover:shadow-lg hover:shadow-black/30 transition-all duration-300 cursor-pointer"

                 th:attr="
                    data-recipe-id=${saved.recipe.id},
                    data-name=${saved.recipe.name},
                    data-description=${saved.recipe.description},
                    data-image=${saved.recipe.imageLink},
                    data-budget=${saved.recipe.isBudget},
                    data-difficulty=${saved.recipe.difficulty},
                    data-prep-time=${saved.recipe.prepTime},
                    data-cook-time=${saved.recipe.cookTime},
                    data-servings=${saved.recipe.servings},
                    data-nutrients=${saved.recipe.nutrients},
                    data-ingredients=${saved.recipe.ingredients},
                    data-steps=${saved.recipe.steps}
                 ">

                <!-- Image area -->
                <div class="relative h-56 bg-green-900/60 overflow-hidden">
                    <img th:if="${saved.recipe.imageLink != null and !#strings.isEmpty(saved.recipe.imageLink)}"
                         th:src="${saved.recipe.imageLink}"
                         th:alt="${saved.recipe.name}"
                         class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"/>

                    <div th:if="${saved.recipe.imageLink == null or #strings.isEmpty(saved.recipe.imageLink)}"
                         class="absolute inset-0 flex items-center justify-center text-4xl text-amber-400/20">
                        <i class="fa-solid fa-bowl-food"></i>
                    </div>

                    <!-- Budget badge -->
                    <span th:if="${saved.recipe.isBudget}"
                          class="absolute top-3 right-3 bg-amber-400 text-green-900 text-xs font-bold px-2 py-0.5 rounded-full">
                        Budget
                    </span>

                    <!-- Unsave button -->
                    <form th:action="@{/saved/{id}/unsave(id=${saved.recipe.id})}"
                          method="post"
                          class="absolute top-3 left-3">
                        <button type="submit"
                                class="w-8 h-8 flex items-center justify-center rounded-full bg-black/40 hover:bg-black/60 text-amber-400 transition-colors cursor-pointer"
                                title="Remove from saved">
                            <i class="fa-solid fa-bookmark text-sm"></i>
                        </button>
                    </form>
                </div>

                <!-- Card content -->
                <div class="flex flex-col gap-3 p-5">
                    <h2 class="text-white font-semibold text-base leading-snug"
                        th:text="${saved.recipe.name}">
                        Recipe name
                    </h2>

                    <p class="text-amber-100/50 text-sm leading-relaxed line-clamp-2"
                       th:text="${saved.recipe.description}">
                        Recipe description
                    </p>

                    <div class="border-t border-amber-400/10"></div>

                    <div class="flex flex-wrap gap-3 text-xs text-amber-400/70">
                        <span class="flex items-center gap-1">
                            <i class="fa-solid fa-clock"></i>
                            <span th:text="${saved.recipe.prepTime != null ? saved.recipe.prepTime + ' mins prep' : '—'}">
                                —
                            </span>
                        </span>

                        <span class="flex items-center gap-1">
                            <i class="fa-solid fa-fire-burner"></i>
                            <span th:text="${saved.recipe.cookTime != null ? saved.recipe.cookTime + ' mins cook' : '—'}">
                                —
                            </span>
                        </span>

                        <span class="flex items-center gap-1">
                            <i class="fa-solid fa-people-group"></i>
                            <span th:text="${saved.recipe.servings != null ? saved.recipe.servings + ' servings' : '—'}">
                                —
                            </span>
                        </span>

                        <span class="flex items-center gap-1">
                            <i class="fa-solid fa-gauge"></i>
                            <span th:text="${saved.recipe.difficulty != null ? saved.recipe.difficulty : '—'}">
                                —
                            </span>
                        </span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Reuse the same modal structure as feed.html -->
<div id="recipe-modal"
     class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4"
     role="dialog" aria-modal="true">

    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeModal()"></div>

    <div class="relative w-full sm:max-w-2xl max-h-[92dvh] sm:max-h-[88dvh] flex flex-col rounded-t-2xl sm:rounded-2xl bg-gray-900 border border-amber-400/15 shadow-2xl overflow-hidden">

        <div class="relative h-52 sm:h-64 bg-green-950 shrink-0 overflow-hidden">
            <img id="modal-image" class="w-full h-full object-cover opacity-90" src="" alt=""/>
            <div id="modal-image-fallback" class="absolute inset-0 flex items-center justify-center text-5xl text-amber-400/20">
                <i class="fa-solid fa-bowl-food"></i>
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-gray-900/30 to-transparent"></div>
            <div class="absolute bottom-0 left-0 right-0 px-5 pb-4">
                <div class="flex flex-wrap items-center gap-2 mb-1.5">
                    <span id="modal-match-score" class="hidden text-xs font-bold px-2 py-0.5 rounded-full"></span>
                    <span id="modal-budget" class="hidden bg-amber-400 text-green-900 text-xs font-bold px-2 py-0.5 rounded-full">Budget</span>
                    <span id="modal-difficulty" class="bg-white/10 text-white text-xs font-medium px-2 py-0.5 rounded-full"></span>
                </div>
                <h2 id="modal-title" class="text-white font-bold text-xl leading-snug"></h2>
            </div>
            <div class="absolute top-3 right-3 flex items-center gap-2">
                <button id="modal-save-btn"
                        class="w-8 h-8 flex items-center justify-center rounded-full bg-black/40 hover:bg-black/60 text-amber-400/60 hover:text-amber-400 transition-colors cursor-pointer">
                    <i class="fa-regular fa-bookmark text-sm"></i>
                </button>
                <button onclick="closeModal()"
                        class="w-8 h-8 flex items-center justify-center rounded-full bg-black/40 hover:bg-black/60 text-white transition-colors cursor-pointer">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-5 py-5 flex flex-col gap-6">
            <p id="modal-description" class="text-amber-100/70 text-sm leading-relaxed"></p>

            <div class="flex flex-wrap gap-4 text-sm text-amber-400/80 border-t border-b border-amber-400/10 py-4">
                <span class="flex items-center gap-1.5">
                    <i class="fa-solid fa-clock text-amber-400/50"></i>
                    <span class="text-amber-100/50 text-xs">Prep</span>
                    <span id="modal-prep" class="font-medium text-white text-xs"></span>
                </span>
                <span class="flex items-center gap-1.5">
                    <i class="fa-solid fa-fire-burner text-amber-400/50"></i>
                    <span class="text-amber-100/50 text-xs">Cook</span>
                    <span id="modal-cook" class="font-medium text-white text-xs"></span>
                </span>
                <span class="flex items-center gap-1.5">
                    <i class="fa-solid fa-people-group text-amber-400/50"></i>
                    <span class="text-amber-100/50 text-xs">Serves</span>
                    <span id="modal-servings" class="font-medium text-white text-xs"></span>
                </span>
            </div>

            <div id="modal-nutrients-section">
                <h3 class="text-amber-400 text-sm font-semibold mb-3">Nutrition per serving</h3>
                <div id="modal-nutrients-grid" class="grid grid-cols-4 gap-2"></div>
            </div>

            <div>
                <h3 class="text-amber-400 text-sm font-semibold mb-3">Ingredients</h3>
                <ul id="modal-ingredients-list" class="flex flex-col gap-1.5"></ul>
            </div>

            <div>
                <h3 class="text-amber-400 text-sm font-semibold mb-3">Method</h3>
                <ol id="modal-steps-list" class="flex flex-col gap-4"></ol>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    const isAuthenticated = [[${#authorization.expression('isAuthenticated()')}]];
</script>
<script th:src="@{/js/modal.js}"></script>
<script th:src="@{/js/saved.js}"></script>

</body>
</html>
