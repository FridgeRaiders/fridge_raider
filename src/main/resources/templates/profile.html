<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head lang="en">
    <meta charset="UTF-8"/>
    <title>Fridge Raider - Profile</title>
    <script src="https://kit.fontawesome.com/850f048d48.js" crossorigin="anonymous"></script>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link th:href="@{/main.css}" rel="stylesheet"/>
</head>
<body class="bg-gray-900 text-white">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="max-w-4xl mx-auto px-6 py-10">

    <!-- PROFILE HEADER -->
    <div class="flex flex-col md:flex-row items-center gap-6 border-b border-white/10 pb-6">

        <!-- Avatar -->
        <div class="w-24 h-24 rounded-full bg-white/10 flex items-center justify-center text-4xl font-bold text-amber-400">
            <span th:text="${#strings.substring(user.email,0,1).toUpperCase()}"></span>
        </div>

        <!-- User Info -->
        <div class="flex-1 text-center md:text-left">
            <h2 class="text-2xl font-semibold">
                <span th:text="${user.displayName} ?: 'No display name'"></span>
            </h2>
            <p class="text-gray-400 mt-1" th:text="${user.email}"></p>

            <!-- Fake stats (Instagram feel) -->
            <div class="flex justify-center md:justify-start gap-6 mt-3 text-sm text-gray-300">
                <span><strong>0</strong> recipes</span>
                <span><strong>0</strong> followers</span>
                <span><strong>0</strong> following</span>
            </div>
        </div>

        <!-- Edit Profile Button -->
        <div class="mt-4 flex justify-center md:justify-start">
            <button onclick="openModal()"
                    class="bg-amber-400 text-gray-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-amber-300 transition active:scale-95">
                Edit Profile
            </button>
        </div>
    </div>
    <!-- EDIT PROFILE MODAL -->
    <div id="editProfileModal"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-50">

        <div class="bg-gray-900 p-6 rounded-xl border border-white/10 shadow-lg w-full max-w-md relative">

            <!-- Close Button -->
            <button onclick="closeModal()"
                    class="absolute top-3 right-3 text-gray-400 hover:text-white text-lg">
                &times;
            </button>

            <h3 class="text-lg font-semibold mb-4 text-amber-400">Edit Profile</h3>

            <form th:action="@{/profile/update}" method="post" class="flex flex-col gap-4">

                <!-- Display Name Input -->
                <div class="flex flex-col">
                    <label class="text-sm text-gray-400 mb-1">Change Your Username</label>
                    <input
                            type="text"
                            name="displayName"
                            placeholder="Enter new username"
                            autocomplete="off"
                            class="bg-transparent py-2.5 px-2 text-sm text-white placeholder:text-amber-100/40 focus:outline-none border border-white/10 rounded-md"
                            required />
                </div>

                <button
                        type="submit"
                        class="bg-amber-400 text-gray-900 font-semibold py-2 rounded-lg hover:bg-amber-300 transition-all active:scale-95">
                    Update
                </button>
            </form>
        </div>
    </div>
</div>

    <!-- RECIPES GRID -->
    <div class="mt-10">
        <h3 class="text-lg font-semibold mb-4 text-amber-400">Recipes</h3>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Placeholder cards -->
            <div class="h-32 bg-white/5 rounded-lg border border-white/10 flex items-center justify-center text-gray-500">
                No recipes yet
            </div>
        </div>
    </div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/profile.js}"></script>

</body>

</html>
